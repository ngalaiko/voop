[package]
name = "bike-computer"
version = "0.1.0"
edition = "2021"

[dependencies]
cortex-m = { version = "0.7", features = ["inline-asm", "critical-section-single-core"] }
cortex-m-rt = "0.7"
embassy-executor = { version = "0.7", features = ["arch-cortex-m", "executor-thread"] }
embassy-nrf = { version = "0.3", features = ["nrf52840", "time-driver-rtc1", "unstable-pac"] }
embassy-time = { version = "0.4" }
embassy-usb = { version = "0.3" }
embassy-sync = "0.8"
panic-halt = "1.0"
ssd1306 = "0.9"
embedded-graphics = "0.8"
display-interface = "0.5"
heapless = "0.8"
nmea = { version = "0.7", default-features = false, features = ["GGA", "GLL", "GSA", "GSV", "RMC", "VTG", "ZDA", "TXT"] }
log = { version = "0.4", default-features = false }
static_cell = "2"

[profile.release]
opt-level = "s"
lto = true
panic = "abort"
