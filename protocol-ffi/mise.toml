[tasks.build]
description = "Compile voop-protocol-ffi: macOS cdylib (for bindgen) and iOS staticlibs (for xcframework)"
sources = ["src/**/*.rs", "Cargo.toml", "../protocol/src/**/*.rs", "../protocol/Cargo.toml"]
outputs = [
  "../target/release-ffi/libvoop_protocol.dylib",
  "../target/aarch64-apple-ios/release-ffi/libvoop_protocol.a",
  "../target/aarch64-apple-ios-sim/release-ffi/libvoop_protocol.a",
]
run = """
cargo build -p voop-protocol-ffi --profile release-ffi
cargo build -p voop-protocol-ffi --profile release-ffi --target aarch64-apple-ios
cargo build -p voop-protocol-ffi --profile release-ffi --target aarch64-apple-ios-sim
"""
