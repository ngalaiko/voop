[tools]
swiftlint = "0.63.3"
swiftformat = "0.61.1"
"gem:xcpretty" = "latest"
# The generate task shells out to xcodegen; declare it so a fresh machine gets it.
xcodegen = "latest"

[tasks.generate]
description = "Generate Xcode project from project.yml"
sources = ["project.yml", "Voop/**/*.swift", "VoopWidget/**/*.swift"]
outputs = ["Voop.xcodeproj/project.pbxproj"]
run = "xcodegen generate --spec project.yml"

[tasks.build]
description = "Build the app for iPhone 17 simulator"
depends = [":generate", ":xcframework"]
run = """
xcodebuild \
  -project Voop.xcodeproj \
  -scheme Voop \
  -destination 'platform=iOS Simulator,name=iPhone 17' \
  -derivedDataPath .build \
  build \
  | xcpretty
"""

[tasks.run]
description = "Launch the app in the iPhone 17 simulator"
depends = [":build"]
run = """
xcrun simctl boot "iPhone 17" 2>/dev/null || true
open -a Simulator
xcrun simctl bootstatus "iPhone 17" -b
xcrun simctl install "iPhone 17" .build/Build/Products/Debug-iphonesimulator/Voop.app
xcrun simctl launch --console "iPhone 17" com.galaiko.voop
"""

[tasks.bindgen]
description = "Generate Swift bindings and C headers from the macOS dylib"
depends = ["//protocol-ffi:build"]
sources = ["../target/release-ffi/libvoop_protocol.dylib"]
outputs = ["Voop/Generated/voop_protocol.swift", "Voop/Generated/voop_protocolFFI.h"]
run = """
mkdir -p Voop/Generated
cargo run -p voop-protocol-ffi --features uniffi-cli --bin uniffi-bindgen -- \
  generate \
  --library ../target/release-ffi/libvoop_protocol.dylib \
  --language swift \
  --out-dir Voop/Generated/
"""

[tasks.xcframework]
description = "Bundle device + simulator staticlibs into an XCFramework"
depends = [":bindgen"]
sources = [
  "../target/aarch64-apple-ios/release-ffi/libvoop_protocol.a",
  "../target/aarch64-apple-ios-sim/release-ffi/libvoop_protocol.a",
  "Voop/Generated/voop_protocolFFI.h",
]
outputs = ["VoopProtocol.xcframework/Info.plist"]
run = """
mkdir -p xcframework-headers
cp Voop/Generated/voop_protocolFFI.h xcframework-headers/
cp Voop/Generated/voop_protocolFFI.modulemap xcframework-headers/module.modulemap

rm -rf VoopProtocol.xcframework
xcodebuild -create-xcframework \
  -library ../target/aarch64-apple-ios/release-ffi/libvoop_protocol.a \
  -headers xcframework-headers/ \
  -library ../target/aarch64-apple-ios-sim/release-ffi/libvoop_protocol.a \
  -headers xcframework-headers/ \
  -output VoopProtocol.xcframework
rm -rf xcframework-headers
"""

[tasks.flash]
description = "Build and install on the first available iOS device"
depends = [":generate", ":xcframework"]
run = """
DEVICE=$(xcrun devicectl list devices 2>/dev/null | grep -E 'available [(]paired[)]|connected' | awk '{print $4}' | head -1)
if [ -z "$DEVICE" ]; then echo "No device found"; exit 1; fi
xcodebuild \
  -project Voop.xcodeproj \
  -scheme Voop \
  -destination "generic/platform=iOS" \
  -derivedDataPath .build \
  -allowProvisioningUpdates \
  -allowProvisioningDeviceRegistration \
  build
xcrun devicectl device install app \
  --device "$DEVICE" \
  "$(pwd)/.build/Build/Products/Debug-iphoneos/Voop.app"
"""

[tasks.lint]
description = "Lint Swift sources with SwiftLint"
run = "swiftlint lint --strict Voop"

[tasks.format]
description = "Format Swift sources with SwiftFormat"
run = "swiftformat Voop"
