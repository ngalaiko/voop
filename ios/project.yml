name: Voop
options:
  bundleIdPrefix: com.galaiko
  deploymentTarget:
    iOS: "26.0"
  defaultConfig: Debug
  xcodeVersion: "16.4"

settings:
  base:
    SWIFT_VERSION: 6.0
    ENABLE_STRICT_CONCURRENCY: complete
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Voop:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Voop
    attributes:
      DevelopmentTeam: 5S3AM79MK3
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.galaiko.voop
        DEVELOPMENT_TEAM: 5S3AM79MK3
        INFOPLIST_FILE: Voop/App/Info.plist
        # Wired here (not in the pbxproj, which xcodegen regenerates) so the HealthKit
        # entitlement actually ships when HealthKitService gets implemented.
        CODE_SIGN_ENTITLEMENTS: Voop/App/Voop.entitlements
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - framework: VoopProtocol.xcframework
        embed: false
      - target: VoopWidget
    scheme:
      testTargets:
        - VoopTests

  VoopTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: VoopTests
    attributes:
      DevelopmentTeam: 5S3AM79MK3
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.galaiko.voop.tests
        DEVELOPMENT_TEAM: 5S3AM79MK3
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: Voop

  VoopWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: VoopWidget
      - path: Voop/Shared/RideActivityAttributes.swift
    attributes:
      DevelopmentTeam: 5S3AM79MK3
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.galaiko.voop.widget
        DEVELOPMENT_TEAM: 5S3AM79MK3
        INFOPLIST_FILE: VoopWidget/Info.plist
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
